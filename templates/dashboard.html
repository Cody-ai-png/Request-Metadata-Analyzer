<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Tracker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .dashboard-header {
            margin-bottom: 30px;
        }
        .card {
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .stats-card {
            text-align: center;
            padding: 20px;
        }
        .stats-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #007bff;
        }
        .stats-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .table-responsive {
            max-height: 500px;
            overflow-y: auto;
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 5px;
        }
        .chart-container {
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #countryChart {
            max-width: 100%;
            max-height: 100%;
        }
        .refresh-btn {
            margin-bottom: 20px;
        }
        .timestamp {
            font-size: 0.8rem;
            color: #6c757d;
        }
        .badge {
            font-size: 0.8rem;
        }
        td small {
            font-size: 0.75rem;
            color: #6c757d;
            display: block;
            margin-top: 3px;
        }
        .table-responsive {
            max-height: 500px;
            overflow-y: auto;
        }
        .table th, .table td {
            vertical-align: middle;
        }
        #visitor-table tr {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #visitor-table tr:hover {
            background-color: rgba(0, 123, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h1 class="display-4">IP Tracker Dashboard</h1>
            <p class="lead">Monitor visitors who clicked your tracking link</p>
            <div class="timestamp">Last updated: <span id="update-time"></span></div>
            <div class="d-flex align-items-center mb-3">
                <button id="refresh-btn" class="btn btn-primary me-3">Refresh Data</button>
                <div class="filter-controls">
                    <label class="me-2">Filter by visitor type:</label>
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="visitor-type" id="all" value="all" checked>
                        <label class="btn btn-outline-secondary" for="all">All</label>
                        
                        <input type="radio" class="btn-check" name="visitor-type" id="human" value="human">
                        <label class="btn btn-outline-secondary" for="human">Human</label>
                        
                        <input type="radio" class="btn-check" name="visitor-type" id="crawler" value="crawler">
                        <label class="btn btn-outline-secondary" for="crawler">Crawler</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card stats-card">
                    <div class="stats-number" id="total-visitors">0</div>
                    <div class="stats-label">Total Visitors</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stats-card">
                    <div class="stats-number" id="unique-ips">0</div>
                    <div class="stats-label">Unique IP Addresses</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stats-card">
                    <div class="stats-number" id="countries-count">0</div>
                    <div class="stats-label">Countries</div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Visitor Locations</h5>
                    </div>
                    <div class="card-body">
                        <div id="map"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Visitors by Country</h5>
                    </div>
                    <div class="card-body chart-container">
                        <canvas id="countryChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">
                <h5>Recent Visitors</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>IP Address</th>
                                <th>Country</th>
                                <th>City</th>
                                <th>Coordinates</th>
                                <th>ISP/Organization</th>
                                <th>Type</th>
                                <th>Device</th>
                                <th>OS</th>
                                <th>Browser</th>
                                <th>Screen</th>
                                <th>Referrer</th>
                            </tr>
                        </thead>
                        <tbody id="visitor-table">
                            <!-- Table rows will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap" async defer></script>
    
    <script>
        // Initialize map
        let map;
        let markers = [];
        
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: {lat: 0, lng: 0},
                zoom: 2
            });
            
            // Load visitor data
            loadVisitorData();
        }
        
        // Load visitor data from API
        function loadVisitorData() {
            // Get selected visitor type filter
            const visitorType = document.querySelector('input[name="visitor-type"]:checked').value;
            
            // Build URL with filter if needed
            let url = '/api/logs';
            if (visitorType !== 'all') {
                url += `?visitor_type=${visitorType}`;
            }
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    updateDashboard(data);
                })
                .catch(error => {
                    console.error('Error fetching visitor data:', error);
                });
                
            // Update timestamp
            const now = new Date();
            document.getElementById('update-time').textContent = now.toLocaleString();
        }
        
        // Update dashboard statistics
        function updateDashboard(logs) {
            // Update last refresh time
            document.getElementById('update-time').textContent = new Date().toLocaleString();
            
            // Update total visitors count
            document.getElementById('total-visitors').textContent = logs.length;
            
            // Count unique IP addresses
            const uniqueIPs = new Set(logs.map(log => log.ip_address)).size;
            document.getElementById('unique-ips').textContent = uniqueIPs;
            
            // Count unique countries
            const uniqueCountries = new Set(logs.map(log => log.country).filter(country => country !== 'Unknown')).size;
            document.getElementById('countries-count').textContent = uniqueCountries;
            
            // Add ISP info to tooltip
            const uniqueOrgs = new Set(logs.map(log => log.organization || log.isp || 'Unknown').filter(org => org !== 'Unknown')).size;
            document.getElementById('countries-count').title = `${uniqueOrgs} unique ISPs/organizations`;
            
            // Update table
            updateTable(logs);
            
            // Update map
            updateMap(logs);
            
            // Update charts
            updateCharts(logs);
        }
        
        // Update visitor table
        function updateTable(logs) {
            const tableBody = document.getElementById('visitor-table');
            tableBody.innerHTML = '';
            
            // Sort logs by timestamp (newest first)
            logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            logs.forEach(log => {
                const row = document.createElement('tr');
                
                // Store latitude and longitude as data attributes for map interaction
                if (log.latitude && log.longitude) {
                    row.dataset.lat = log.latitude;
                    row.dataset.lng = log.longitude;
                    row.dataset.ip = log.ip_address;
                    row.dataset.location = `${log.city || 'Unknown'}, ${log.country || 'Unknown'}`;
                    
                        // Add click event to zoom to location
                    row.addEventListener('click', function() {
                        const title = `${log.ip_address} (${log.organization || log.isp || 'Unknown ISP'})`;
                        zoomToLocation(log.latitude, log.longitude, title, log);
                    });
                }
                
                // Format timestamp
                const timestamp = document.createElement('td');
                timestamp.textContent = log.timestamp;
                row.appendChild(timestamp);
                
                // IP address
                const ip = document.createElement('td');
                ip.textContent = log.ip_address;
                row.appendChild(ip);
                
                // Country
                const country = document.createElement('td');
                country.textContent = log.country || 'Unknown';
                row.appendChild(country);
                
                // City
                const city = document.createElement('td');
                city.textContent = log.city || 'Unknown';
                row.appendChild(city);
                
                // Coordinates (latitude and longitude)
                const coordinates = document.createElement('td');
                if (log.latitude && log.longitude) {
                    coordinates.textContent = `${log.latitude.toFixed(6)}, ${log.longitude.toFixed(6)}`;
                } else {
                    coordinates.textContent = 'Unknown';
                }
                row.appendChild(coordinates);
                
                // ISP/Organization information
                const ispInfo = document.createElement('td');
                let ispText = '';
                if (log.organization && log.organization !== 'Unknown') {
                    ispText = log.organization;
                } else if (log.isp && log.isp !== 'Unknown') {
                    ispText = log.isp;
                } else if (log.asn && log.asn !== 'Unknown') {
                    ispText = log.asn;
                } else {
                    ispText = 'Unknown';
                }
                ispInfo.textContent = ispText;
                row.appendChild(ispInfo);
                
                // Visitor type
                const visitorType = document.createElement('td');
                if (log.visitor_type === 'crawler') {
                    visitorType.innerHTML = '<span class="badge bg-secondary">Crawler</span>';
                    if (log.bot_name && log.bot_name !== 'N/A') {
                        visitorType.innerHTML += `<br><small>${log.bot_name}</small>`;
                    }
                } else {
                    visitorType.innerHTML = '<span class="badge bg-success">Human</span>';
                }
                row.appendChild(visitorType);
                
                // Device information
                const deviceInfo = document.createElement('td');
                if (log.visitor_type === 'crawler') {
                    deviceInfo.textContent = 'Bot/Crawler';
                } else {
                    let deviceText = log.device_type;
                    if (log.device_brand !== 'N/A') {
                        deviceText += ` (${log.device_brand}`;
                        if (log.device_model !== 'N/A') {
                            deviceText += ` ${log.device_model}`;
                        }
                        deviceText += ')';
                    }
                    deviceInfo.textContent = deviceText;
                }
                row.appendChild(deviceInfo);
                
                // OS information
                const osInfo = document.createElement('td');
                if (log.os_family !== 'N/A') {
                    let osText = log.os_family;
                    if (log.os_version !== 'N/A') {
                        osText += ` ${log.os_version}`;
                    }
                    osInfo.textContent = osText;
                } else {
                    osInfo.textContent = 'N/A';
                }
                row.appendChild(osInfo);
                
                // Browser information
                const browserInfo = document.createElement('td');
                if (log.browser_family !== 'N/A') {
                    let browserText = log.browser_family;
                    if (log.browser_version !== 'N/A') {
                        browserText += ` ${log.browser_version}`;
                    }
                    browserInfo.textContent = browserText;
                } else {
                    browserInfo.textContent = 'N/A';
                }
                row.appendChild(browserInfo);
                
                // Screen resolution
                const screenInfo = document.createElement('td');
                screenInfo.textContent = log.screen_resolution || 'Unknown';
                row.appendChild(screenInfo);
                
                // Referrer information
                const referrerInfo = document.createElement('td');
                const referrerText = log.referrer || 'Direct/Unknown';
                // Truncate long referrers with ellipsis and show full on hover
                if (referrerText.length > 30) {
                    referrerInfo.textContent = referrerText.substring(0, 27) + '...';
                    referrerInfo.title = referrerText; // Full URL on hover
                } else {
                    referrerInfo.textContent = referrerText;
                }
                row.appendChild(referrerInfo);
                
                tableBody.appendChild(row);
            });
        }
        
        // Update map with visitor locations
        function updateMap(logs) {
            logs.forEach(log => {
                if (log.latitude && log.longitude) {
                    const position = {
                        lat: log.latitude,
                        lng: log.longitude
                    };
                    
                    const marker = new google.maps.Marker({
                        position: position,
                        map: map,
                        title: `${log.ip_address} - ${log.city}, ${log.country}`
                    });
                    
                    const infoWindow = new google.maps.InfoWindow({
                        content: `
                            <div>
                                <h6>${log.ip_address}</h6>
                                <p>${log.city || 'Unknown'}, ${log.country || 'Unknown'}</p>
                                <p>ISP: ${log.organization || log.isp || 'Unknown'}</p>
                                <p>ASN: ${log.asn || 'Unknown'}</p>
                                <p>Visited: ${log.timestamp}</p>
                                <p>Type: ${log.visitor_type === 'crawler' ? 'Crawler' : 'Human'}</p>
                                ${log.visitor_type === 'human' ? `
                                <p>Device: ${log.device_type !== 'N/A' ? log.device_type : 'Unknown'}</p>
                                <p>OS: ${log.os_family !== 'N/A' ? log.os_family + (log.os_version !== 'N/A' ? ' ' + log.os_version : '') : 'Unknown'}</p>
                                <p>Browser: ${log.browser_family !== 'N/A' ? log.browser_family + (log.browser_version !== 'N/A' ? ' ' + log.browser_version : '') : 'Unknown'}</p>
                                <p>Screen: ${log.screen_resolution || 'Unknown'}</p>
                                <p>Referrer: ${log.referrer || 'Direct/Unknown'}</p>
                                ` : `<p>Bot: ${log.bot_name !== 'N/A' ? log.bot_name : 'Unknown'}</p>`}
                            </div>
                        `
                    });
                    
                    marker.addListener('click', () => {
                        infoWindow.open(map, marker);
                    });
                    
                    markers.push(marker);
                }
            });
        }
        
        // Clear all markers from the map
        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
        }
        
        // Zoom to a specific location on the map
        function zoomToLocation(lat, lng, title, logData) {
            // Center map on the location
            map.setCenter({lat: parseFloat(lat), lng: parseFloat(lng)});
            map.setZoom(12); // Zoom in closer
            
            // Find the marker for this location
            let targetMarker = null;
            for (let i = 0; i < markers.length; i++) {
                if (markers[i].getTitle().startsWith(title)) {
                    targetMarker = markers[i];
                    break;
                }
            }
            
            // If marker found, open its info window
            if (targetMarker) {
                // Create info window content
                const content = `
                    <div>
                        <h6>${logData.ip_address}</h6>
                        <p>${logData.city || 'Unknown'}, ${logData.country || 'Unknown'}</p>
                        <p>ISP: ${logData.organization || logData.isp || 'Unknown'}</p>
                        <p>ASN: ${logData.asn || 'Unknown'}</p>
                        <p>Visited: ${logData.timestamp}</p>
                        <p>Type: ${logData.visitor_type === 'crawler' ? 'Crawler' : 'Human'}</p>
                        ${logData.visitor_type === 'human' ? `
                        <p>Device: ${logData.device_type !== 'N/A' ? logData.device_type : 'Unknown'}</p>
                        <p>OS: ${logData.os_family !== 'N/A' ? logData.os_family + (logData.os_version !== 'N/A' ? ' ' + logData.os_version : '') : 'Unknown'}</p>
                        <p>Browser: ${logData.browser_family !== 'N/A' ? logData.browser_family + (logData.browser_version !== 'N/A' ? ' ' + logData.browser_version : '') : 'Unknown'}</p>
                        <p>Screen: ${logData.screen_resolution || 'Unknown'}</p>
                        <p>Referrer: ${logData.referrer || 'Direct/Unknown'}</p>
                        ` : `<p>Bot: ${logData.bot_name !== 'N/A' ? logData.bot_name : 'Unknown'}</p>`}
                    </div>
                `;
                
                // Create and open info window
                const infoWindow = new google.maps.InfoWindow({
                    content: content
                });
                
                infoWindow.open(map, targetMarker);
            }
            
            // Highlight the row in the table
            const rows = document.querySelectorAll('#visitor-table tr');
            rows.forEach(row => row.classList.remove('table-primary'));
            
            // Find the clicked row and add highlight class
            rows.forEach(row => {
                if (row.dataset.ip === title) {
                    row.classList.add('table-primary');
                    // Scroll the row into view if needed
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }
        
        // Update charts
        function updateCharts(logs) {
            // Get the chart container
            const chartContainer = document.querySelector('.chart-container');
            
            // Clear any previous content
            chartContainer.innerHTML = '<canvas id="countryChart"></canvas>';
            
            // Count visitors by country
            const countryCounts = {};
            logs.forEach(log => {
                const country = log.country || 'Unknown';
                countryCounts[country] = (countryCounts[country] || 0) + 1;
            });
            
            // If no data, show a message
            if (Object.keys(countryCounts).length === 0) {
                chartContainer.innerHTML = '<div class="text-center p-5"><p>No country data available yet</p></div>';
                return;
            }
            
            // Sort countries by count
            const sortedCountries = Object.entries(countryCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10); // Top 10 countries
            
            // Prepare data for chart
            const labels = sortedCountries.map(entry => entry[0]);
            const data = sortedCountries.map(entry => entry[1]);
            
            // Define colors
            const backgroundColors = [
                'rgba(255, 99, 132, 0.7)',
                'rgba(54, 162, 235, 0.7)',
                'rgba(255, 206, 86, 0.7)',
                'rgba(75, 192, 192, 0.7)',
                'rgba(153, 102, 255, 0.7)',
                'rgba(255, 159, 64, 0.7)',
                'rgba(199, 199, 199, 0.7)',
                'rgba(83, 102, 255, 0.7)',
                'rgba(40, 159, 64, 0.7)',
                'rgba(210, 99, 132, 0.7)'
            ];
            
            // Get the canvas context
            const ctx = document.getElementById('countryChart').getContext('2d');
            
            // Create a simple pie chart
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: backgroundColors.slice(0, labels.length),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            left: 10,
                            right: 10,
                            top: 10,
                            bottom: 10
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'right',
                            align: 'center'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    const total = context.dataset.data.reduce((acc, val) => acc + val, 0);
                                    const percentage = Math.round((value / total) * 100);
                                    return `${label}: ${value} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Refresh button event listener
        document.getElementById('refresh-btn').addEventListener('click', loadVisitorData);
        
        // Add event listeners for filter buttons
        document.querySelectorAll('input[name="visitor-type"]').forEach(radio => {
            radio.addEventListener('change', loadVisitorData);
        });
        
        // Auto-refresh every 30 seconds
        setInterval(loadVisitorData, 30000);
    </script>
</body>
</html>
